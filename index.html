<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 Words</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; }
        /* ชุดคำสั่งสำหรับทำ Flip Card */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="font-bold text-xl text-indigo-600">📚 Oxford 3000</h1>
            <div class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-medium">
                จำได้แล้ว: <span id="fav-count">0</span> คำ
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Sidebar หมวดหมู่ -->
        <aside class="lg:col-span-1">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 sticky top-24 h-[calc(100vh-8rem)] overflow-y-auto">
                <h2 class="text-sm font-bold text-slate-400 uppercase mb-4">หมวดหมู่</h2>
                <div id="category-list" class="space-y-1">
                    <!-- รายชื่อหมวดหมู่จะถูกใส่ที่นี่ -->
                    <p class="text-center text-sm text-slate-500 py-4">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </aside>

        <!-- พื้นที่แสดงคำศัพท์ -->
        <main class="lg:col-span-3">
            <div class="mb-6 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h2 id="active-category-title" class="text-lg font-bold text-slate-800">เลือกหมวดหมู่</h2>
                <span class="text-xs text-slate-500">คลิกที่การ์ดเพื่อดูคำแปล</span>
            </div>

            <div id="word-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <!-- การ์ดคำศัพท์จะถูกใส่ที่นี่ -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
